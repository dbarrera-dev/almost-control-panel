<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  user-select: none;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
}
:root {
  --bg: rgba(18,18,18,0.92);
  --radius: 6px;
}

#box {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  padding: 6px 14px;
  background: var(--bg);
  border-radius: var(--radius);
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
#box.visible {
  opacity: 1;
  transform: translateY(0);
}
#label {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  font-weight: 400;
}
#nick {
  font-size: 12px;
  font-weight: 700;
  color: #f97316;
}
</style>
</head>
<body>
<div id="box">
  <span id="label">Pedido por:</span>
  <span id="nick"></span>
</div>

<script>
const box  = document.getElementById('box');
const nick = document.getElementById('nick');

let hideTimer = null;

function show(name, remainingMs) {
  clearTimeout(hideTimer);
  nick.textContent = name;
  box.classList.add('visible');
  if (remainingMs > 0) hideTimer = setTimeout(hide, remainingMs);
}

function hide() {
  clearTimeout(hideTimer);
  box.classList.remove('visible');
}

function getWsCandidates() {
  const params = new URLSearchParams(window.location.search || '');
  const custom = params.get('ws');
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const sameHost = window.location.host ? `${proto}//${window.location.host}` : '';
  return [...new Set([custom, sameHost, 'ws://localhost:9002', 'ws://127.0.0.1:9002'].filter(Boolean))];
}

let _retryDelay = 500;
let _wsCandidates = getWsCandidates();
let _wsIndex = 0;

function scheduleReconnect() {
  _wsIndex = (_wsIndex + 1) % _wsCandidates.length;
  const delay = _retryDelay;
  _retryDelay = Math.min(_retryDelay * 2, 8000);
  setTimeout(connect, delay);
}

function connect() {
  const wsUrl = _wsCandidates[_wsIndex] || 'ws://localhost:9002';
  let ws = null;
  try {
    ws = new WebSocket(wsUrl);
  } catch {
    scheduleReconnect();
    return;
  }
  ws.onopen = () => {
    _retryDelay = 500;
    _wsIndex = 0;
  };
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'track') {
        if (msg.data.requester) {
          const remaining = (msg.data.duration_ms || 0) - (msg.data.progress_ms || 0);
          show(msg.data.requester, remaining);
        } else hide();
      }
    } catch {}
  };
  ws.onclose = scheduleReconnect;
  ws.onerror = () => { ws.close(); };
}
connect();
</script>
</body>
</html>
