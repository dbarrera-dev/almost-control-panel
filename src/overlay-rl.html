<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
}
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  user-select: none;
}
:root {
  --bg: rgba(8,11,18,0.84);
  --text: #eef4ff;
  --sub: rgba(183, 196, 224, 0.72);
  --accent: #f97316;
  --ok: #22c55e;
  --bad: #ef4444;
  --gold: #f59e0b;
  --radius: 14px;
}

#empty {
  position: fixed;
  left: 24px;
  right: 24px;
  bottom: 18px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(6,9,15,0.62);
  color: var(--sub);
  font-size: 12px;
  text-align: center;
  padding: 10px 12px;
  backdrop-filter: blur(3px);
}

#dock {
  position: fixed;
  left: 24px;
  right: 24px;
  bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.11);
  background:
    radial-gradient(120% 130% at 0% 0%, rgba(249,115,22,0.14), transparent 42%),
    radial-gradient(120% 130% at 100% 100%, rgba(34,197,94,0.12), transparent 55%),
    var(--bg);
  padding: 8px 10px;
  color: var(--text);
  backdrop-filter: blur(4px);
  overflow: hidden;
}
#dock::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), #f59e0b 45%, #22c55e);
}

.hide { display: none !important; }

.brand {
  min-width: 210px;
  max-width: 280px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.13);
  background: rgba(255,255,255,0.04);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.brand-text {
  min-width: 0;
}
.kicker {
  font-size: 8px;
  color: var(--sub);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 1px;
}
.player {
  font-size: 12px;
  font-weight: 800;
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.playlist {
  font-size: 9px;
  color: var(--sub);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sep {
  width: 1px;
  height: 34px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.chip {
  min-width: 76px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  padding: 5px 8px;
  flex-shrink: 0;
}
.chip-l {
  font-size: 7px;
  color: var(--sub);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.chip-v {
  font-size: 15px;
  line-height: 1;
  font-weight: 800;
}
.chip-v.small {
  font-size: 14px;
}
.icon {
  width: 11px;
  height: 11px;
  opacity: 0.9;
}

#resultChip {
  min-width: 128px;
  background: rgba(255,255,255,0.04);
}
.result-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.result-icon-wrap {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#resultIcon {
  width: 12px;
  height: 12px;
}

.mmr-chip {
  margin-left: auto;
  min-width: 102px;
  text-align: right;
}
.mmr-row {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.trophy {
  width: 14px;
  height: 14px;
  color: var(--gold);
}

@media (max-width: 1200px) {
  #dock {
    left: 14px;
    right: 14px;
    bottom: 12px;
    transform: scale(0.92);
    transform-origin: left bottom;
  }
}
</style>
</head>
<body>
  <div id="empty">Sin datos de Rocket League</div>

  <div id="dock" class="hide">
    <div class="brand">
      <span class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12h4l3-5 3 10 3-5h3"></path>
        </svg>
      </span>
      <div class="brand-text">
        <div class="kicker">Realtime API</div>
        <div class="player" id="rankName">—</div>
        <div class="playlist" id="playlistVal">Live match session</div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="chip" id="resultChip">
      <div class="chip-l">Resultado</div>
      <div class="result-row">
        <span class="result-icon-wrap">
          <svg id="resultIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
        </span>
        <div class="chip-v small" id="resultVal">—</div>
      </div>
    </div>

    <div class="chip">
      <div class="chip-l">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 13 4 4L19 7"></path></svg>
        Wins
      </div>
      <div class="chip-v" id="winsVal">0</div>
    </div>

    <div class="chip">
      <div class="chip-l">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 6 12 12"></path><path d="m18 6-12 12"></path></svg>
        Losses
      </div>
      <div class="chip-v" id="lossesVal">0</div>
    </div>

    <div class="chip">
      <div class="chip-l">Streak</div>
      <div class="chip-v" id="streakVal">0</div>
    </div>

    <div class="chip">
      <div class="chip-l">Goals</div>
      <div class="chip-v" id="goalsVal">0</div>
    </div>

    <div class="chip">
      <div class="chip-l">W/L sesión</div>
      <div class="chip-v small" id="wlVal">0 / 0</div>
    </div>

    <div class="chip">
      <div class="chip-l">Goals sesión</div>
      <div class="chip-v" id="sessionGoalsVal">0</div>
    </div>

    <div class="chip">
      <div class="chip-l">MMR sesión</div>
      <div class="chip-v" id="mmrDeltaVal">+0</div>
    </div>

    <div class="chip mmr-chip">
      <div class="chip-l" style="justify-content:flex-end">MMR</div>
      <div class="mmr-row">
        <svg class="trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3h8v3a4 4 0 0 1-8 0z"></path>
          <path d="M6 6H4a2 2 0 0 0 0 4h2"></path>
          <path d="M18 6h2a2 2 0 0 1 0 4h-2"></path>
          <path d="M12 10v5"></path>
          <path d="M9 21h6"></path>
          <path d="M10 15h4"></path>
        </svg>
        <div class="chip-v" id="mmrVal">—</div>
      </div>
    </div>
  </div>

<script>
const el = {
  empty: document.getElementById('empty'),
  dock: document.getElementById('dock'),
  rankName: document.getElementById('rankName'),
  playlistVal: document.getElementById('playlistVal'),
  resultChip: document.getElementById('resultChip'),
  resultVal: document.getElementById('resultVal'),
  resultIcon: document.getElementById('resultIcon'),
  winsVal: document.getElementById('winsVal'),
  lossesVal: document.getElementById('lossesVal'),
  streakVal: document.getElementById('streakVal'),
  goalsVal: document.getElementById('goalsVal'),
  wlVal: document.getElementById('wlVal'),
  sessionGoalsVal: document.getElementById('sessionGoalsVal'),
  mmrDeltaVal: document.getElementById('mmrDeltaVal'),
  mmrVal: document.getElementById('mmrVal'),
};

function resultText(last) {
  if (last === 'win') return 'WIN';
  if (last === 'loss') return 'LOSS';
  return '—';
}

function streakText(streak) {
  const n = Number(streak || 0);
  if (n > 0) return `W${n}`;
  if (n < 0) return `L${Math.abs(n)}`;
  return '0';
}

function applyConfig(cfg) {
  if (!cfg) return;
  const s = cfg.style || {};
  document.documentElement.style.setProperty('--bg', s.bg || 'rgba(8,11,18,0.84)');
  document.documentElement.style.setProperty('--text', s.text || '#eef4ff');
  document.documentElement.style.setProperty('--accent', s.accent || '#f97316');
  document.documentElement.style.setProperty('--radius', `${Number(s.radius ?? 14)}px`);
}

function setResultStyle(last) {
  if (last === 'win') {
    el.resultVal.style.color = 'var(--ok)';
    el.resultIcon.style.color = 'var(--ok)';
    el.resultIcon.innerHTML = '<path d="m5 13 4 4L19 7"></path>';
    el.resultChip.style.borderColor = 'rgba(34,197,94,0.35)';
    return;
  }
  if (last === 'loss') {
    el.resultVal.style.color = 'var(--bad)';
    el.resultIcon.style.color = 'var(--bad)';
    el.resultIcon.innerHTML = '<path d="m6 6 12 12"></path><path d="m18 6-12 12"></path>';
    el.resultChip.style.borderColor = 'rgba(239,68,68,0.35)';
    return;
  }
  el.resultVal.style.color = 'var(--text)';
  el.resultIcon.style.color = 'var(--sub)';
  el.resultIcon.innerHTML = '<path d="M12 5v14"></path><path d="M5 12h14"></path>';
  el.resultChip.style.borderColor = 'rgba(255,255,255,0.1)';
}

function applyStats(payload) {
  const stats = payload?.stats;
  const delta = payload?.delta || {};
  const session = payload?.session || {};
  if (!stats) return;

  el.empty.classList.add('hide');
  el.dock.classList.remove('hide');

  el.rankName.textContent = stats.rank || 'Realtime API';
  el.playlistVal.textContent = stats.playlist || 'Live match session';

  el.winsVal.textContent = Number.isFinite(Number(stats.wins)) ? String(stats.wins) : '0';
  el.lossesVal.textContent = Number.isFinite(Number(stats.losses)) ? String(stats.losses) : '0';
  el.goalsVal.textContent = Number.isFinite(Number(stats.goals)) ? String(stats.goals) : '0';

  const res = resultText(session.lastResult);
  el.resultVal.textContent = res;
  setResultStyle(session.lastResult);

  const streak = streakText(session.streak);
  el.streakVal.textContent = streak;
  el.streakVal.style.color = streak.startsWith('W') ? 'var(--ok)' : streak.startsWith('L') ? 'var(--bad)' : 'var(--text)';

  el.wlVal.textContent = `${Number(session.wins || 0)} / ${Number(session.losses || 0)}`;
  el.sessionGoalsVal.textContent = String(Number(session.goals || 0));

  const mmrD = Number(delta.mmr || 0);
  el.mmrDeltaVal.textContent = mmrD > 0 ? `+${mmrD}` : `${mmrD}`;
  el.mmrDeltaVal.style.color = mmrD > 0 ? 'var(--ok)' : mmrD < 0 ? 'var(--bad)' : 'var(--text)';

  el.mmrVal.textContent = Number.isFinite(Number(stats.mmr)) ? String(stats.mmr) : '—';
}

function connect() {
  const ws = new WebSocket('ws://localhost:9003');
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'config') applyConfig(msg.data);
      if (msg.type === 'stats') applyStats(msg.data);
    } catch {}
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => {};
}

connect();
</script>
</body>
</html>
