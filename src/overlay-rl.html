<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  user-select: none;
}
:root {
  --bg:     rgba(15,15,20,0.92);
  --text:   #ffffff;
  --sub:    rgba(255,255,255,0.58);
  --accent: #2563eb;
  --radius: 12px;
}

#widget {
  display: inline-flex;
  flex-direction: column;
  gap: 10px;
  padding: 14px 18px;
  background: var(--bg);
  border-radius: var(--radius);
  width: fit-content;
  min-width: 220px;
  position: relative;
  overflow: hidden;
}
#widget::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  gap: 8px;
}
#rank-icon {
  font-size: 22px;
  line-height: 1;
}
#rank-info {
  flex: 1;
}
#rank-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--rank-color, var(--text));
  line-height: 1.2;
}
#rank-div {
  font-size: 10px;
  color: var(--sub);
  line-height: 1.3;
}
#mmr-badge {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
#mmr-val {
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
#mmr-label {
  font-size: 9px;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Divider */
.div-line {
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: -2px 0;
}

/* Stats grid */
#stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  background: rgba(255,255,255,0.04);
  border-radius: calc(var(--radius) - 4px);
  padding: 6px 4px;
}
.stat-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-lbl {
  font-size: 9px;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Session delta */
#session {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.delta {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
}
.delta-arrow { font-size: 10px; }
.delta.pos { color: #22c55e; }
.delta.neg { color: #ef4444; }
.delta.neu { color: var(--sub); }
.delta-lbl { font-size: 9px; color: var(--sub); font-weight: 400; }

/* Win rate bar */
#wr-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
#wr-header {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
#wr-track {
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
#wr-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.6s ease;
  width: 0%;
}

/* Playlist badge */
#playlist {
  font-size: 9px;
  color: var(--sub);
  text-align: center;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Loading / no data */
#no-data {
  text-align: center;
  color: var(--sub);
  font-size: 12px;
  padding: 10px 0;
}

.sp-h { display: none !important; }
</style>
</head>
<body>
<div id="widget">
  <div id="no-data">Sin datos — configura tu usuario</div>

  <div id="main-content" class="sp-h">
    <div id="header">
      <div id="rank-icon">🚀</div>
      <div id="rank-info">
        <div id="rank-name">—</div>
        <div id="rank-div"></div>
      </div>
      <div id="mmr-badge">
        <div id="mmr-val">—</div>
        <div id="mmr-label">MMR</div>
      </div>
    </div>

    <div class="div-line"></div>

    <div id="stats">
      <div class="stat">
        <div class="stat-val" id="s-wins">—</div>
        <div class="stat-lbl">Wins</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-losses">—</div>
        <div class="stat-lbl">Losses</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="s-matches">—</div>
        <div class="stat-lbl">Played</div>
      </div>
    </div>

    <div id="wr-wrap">
      <div id="wr-header">
        <span>Win Rate</span>
        <span id="wr-pct">—%</span>
      </div>
      <div id="wr-track"><div id="wr-fill"></div></div>
    </div>

    <div class="div-line"></div>

    <div id="session">
      <div class="delta neu" id="d-mmr">
        <span class="delta-arrow">▸</span>
        <span id="d-mmr-val">0</span>
        <span class="delta-lbl">MMR</span>
      </div>
      <div class="delta neu" id="d-record">
        <span class="delta-arrow">▸</span>
        <span id="d-wins-val">0</span>
        <span>W</span>
        <span style="color:var(--sub);padding:0 1px">/</span>
        <span id="d-losses-val">0</span>
        <span>L</span>
        <span class="delta-lbl" style="margin-left:2px">sesión</span>
      </div>
    </div>

    <div id="playlist"></div>
  </div>
</div>

<script>
const el = {
  noData:    document.getElementById('no-data'),
  main:      document.getElementById('main-content'),
  rankName:  document.getElementById('rank-name'),
  rankDiv:   document.getElementById('rank-div'),
  rankIcon:  document.getElementById('rank-icon'),
  mmrVal:    document.getElementById('mmr-val'),
  wins:      document.getElementById('s-wins'),
  losses:    document.getElementById('s-losses'),
  matches:   document.getElementById('s-matches'),
  wrPct:     document.getElementById('wr-pct'),
  wrFill:    document.getElementById('wr-fill'),
  dMmr:      document.getElementById('d-mmr'),
  dMmrVal:   document.getElementById('d-mmr-val'),
  dWins:     document.getElementById('d-wins-val'),
  dLosses:   document.getElementById('d-losses-val'),
  playlist:  document.getElementById('playlist'),
};

const RANK_ICONS = {
  bronze: '🟫', silver: '⬜', gold: '🟨',
  platinum: '🔷', diamond: '💎', champion: '🏆',
  grandchampion: '🌟', supersonic: '🔮',
  unranked: '❓'
};

function rankIcon(tier) {
  const t = (tier || '').toLowerCase();
  for (const [k, v] of Object.entries(RANK_ICONS)) { if (t.includes(k)) return v; }
  return '🚀';
}

function applyStats({ stats, delta }) {
  if (!stats) return;
  el.noData.classList.add('sp-h');
  el.main.classList.remove('sp-h');

  document.documentElement.style.setProperty('--rank-color', stats.color || '#fff');
  el.rankName.textContent  = stats.rank || '—';
  el.rankDiv.textContent   = stats.division || '';
  el.rankIcon.textContent  = rankIcon(stats.rank);
  el.mmrVal.textContent    = stats.mmr || '—';
  el.wins.textContent      = stats.wins ?? '—';
  el.losses.textContent    = stats.losses ?? '—';
  el.matches.textContent   = stats.matches ?? '—';
  el.wrPct.textContent     = stats.winRate ? stats.winRate.toFixed(1) + '%' : '—%';
  el.wrFill.style.width    = (stats.winRate || 0) + '%';
  el.playlist.textContent  = stats.playlist || '';

  // Delta
  if (delta) {
    const mmrDiff = delta.mmr || 0;
    el.dMmrVal.textContent = (mmrDiff > 0 ? '+' : '') + mmrDiff;
    el.dMmr.className = 'delta ' + (mmrDiff > 0 ? 'pos' : mmrDiff < 0 ? 'neg' : 'neu');

    el.dWins.textContent   = delta.wins || 0;
    el.dLosses.textContent = delta.losses || 0;
    const net = (delta.wins || 0) - (delta.losses || 0);
    el.dMmr.querySelector('.delta-arrow').textContent = mmrDiff >= 0 ? '▲' : '▼';
  }
}

function applyConfig(cfg) {
  if (!cfg) return;
  const s = cfg.style || {};
  document.documentElement.style.setProperty('--bg',     s.bg     || 'rgba(15,15,20,0.92)');
  document.documentElement.style.setProperty('--text',   s.text   || '#fff');
  document.documentElement.style.setProperty('--accent', s.accent || '#2563eb');
  document.documentElement.style.setProperty('--radius', (s.radius ?? 12) + 'px');
}

function connect() {
  const ws = new WebSocket('ws://localhost:9003');
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'config') applyConfig(msg.data);
      if (msg.type === 'stats')  applyStats(msg.data);
    } catch {}
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => {};
}
connect();
</script>
</body>
</html>
