  /* La imagen llena el viewport como una sola foto continua;
     cada tecla / parte del mouse "perfora" su porcion. */
  #container {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px;
    width: fit-content;
    position: relative;
  }
  #modifiers { display: flex; flex-direction: column; gap: 5px; }
  #modifiers:empty { display: none; }
  #keyboard  { display: flex; flex-direction: column; gap: 5px; position: relative; }
  .key-row { display: flex; gap: 5px; align-items: center; width: 100%; }
  .key.key-flex { flex: 1; min-width: 60px; }

  /* ── Wooting 80HE: firma sutil, sólo texto ─────────────── */
  #keyboard { padding-bottom: 22px; position: relative; }
  #kb-brand {
    position: absolute;
    left: 2px;
    bottom: 0;
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    color: #ffffff;
    font-family: 'Russo One', 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-shadow:
      0 1px 2px rgba(0,0,0,.9),
      0 0 6px rgba(0,0,0,.6);
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }
  #kb-brand .kb-brand-mark,
  #kb-brand .kb-brand-sep,
  #kb-brand .kb-brand-led { display: none; }
  #kb-brand .kb-brand-name,
  #kb-brand .kb-brand-model { color: #ffffff; font-weight: 400; }
  /* Tamaños responsivos */
  #container.sz-sm #keyboard { padding-bottom: 18px; }
  #container.sz-sm #kb-brand { font-size: 9px;  letter-spacing: 2px; }
  #container.sz-lg #keyboard { padding-bottom: 26px; }
  #container.sz-lg #kb-brand { font-size: 13px; letter-spacing: 3px; }
  #container.sz-xl #keyboard { padding-bottom: 32px; }
  #container.sz-xl #kb-brand { font-size: 16px; letter-spacing: 3.5px; }

  /* ── Tecla: ventana al fragmento de imagen + look glossy ── */
  .key {
    display: inline-flex;
    position: relative;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 9px;
    font-weight: 800;
    letter-spacing: .4px;
    min-width: 38px;
    padding: 3px 9px;
    height: 38px;
    white-space: nowrap;
    overflow: hidden;
    isolation: isolate;
    color: #fff;
    background-color: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    transition: transform .05s ease, opacity .06s ease, border-color .08s ease, box-shadow .12s ease;
    box-shadow:
      0 6px 18px rgba(0,0,0,.55),
      0 1px 2px rgba(0,0,0,.4),
      inset 0 1px 0 rgba(255,255,255,.22),
      inset 0 -2px 4px rgba(0,0,0,.45),
      inset 0 0 0 1px rgba(0,0,0,.25);
    opacity: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,.95), 0 0 10px rgba(0,0,0,.7);
  }
  .key.key-mod { min-width: 64px; padding: 3px 10px; font-size: 10px; }

  /* Porcion de imagen calculada por JS: la imagen tiene exactamente el tamaño
     del cluster (--cw x --ch) y cada tecla muestra su pedazo via offset negativo. */
  .key::before {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--bg-img);
    background-size: var(--cw, 360px) var(--ch, 200px);
    background-position: var(--bg-x, 0px) var(--bg-y, 0px);
    background-repeat: no-repeat;
    opacity: var(--key-opacity, 1);
    z-index: 0;
    pointer-events: none;
    transition: opacity .12s ease;
  }
  /* Chamfer realista de keycap: brillo superior nítido + vignette inferior + sheen lateral. */
  .key::after {
    content: '';
    position: absolute; inset: 0;
    background:
      /* sheen diagonal sutil (luz reflejada) */
      linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 35%, rgba(255,255,255,0) 65%, rgba(255,255,255,.04) 100%),
      /* bisel superior tipo PBT pulido */
      linear-gradient(180deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,.04) 18%, rgba(255,255,255,0) 35%, rgba(0,0,0,0) 70%, rgba(0,0,0,.28) 100%),
      /* vignette en esquinas inferiores para "asentar" la tecla */
      radial-gradient(ellipse 100% 60% at 50% 110%, rgba(0,0,0,.32), transparent 60%);
    z-index: 1;
    pointer-events: none;
    transition: opacity .12s ease;
    border-radius: inherit;
  }
  .key-main, .key-sub { position: relative; z-index: 2; }
  .key-main {
    font-size: inherit; font-weight: 800; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .key.has-sub { padding: 4px 9px 13px; }
  .key.has-sub .key-main { transform: translateY(-3px); }
  .key-sub {
    position: absolute;
    left: 0; right: 0; bottom: 5px;
    font-size: .56em; font-weight: 700; opacity: .75; line-height: 1;
    letter-spacing: .8px;
    text-align: center; text-transform: uppercase;
    transition: opacity .06s ease;
    z-index: 2;
    text-shadow: 0 1px 2px rgba(0,0,0,.85), 0 0 6px rgba(0,0,0,.6);
  }
  .key.active .key-sub { opacity: 1; color: var(--press-fg, #000000); text-shadow: none; }

  .key.hi {
    border-color: rgba(255,255,255,.42) !important;
    box-shadow:
      0 4px 16px rgba(0,0,0,.55),
      0 0 12px rgba(255,255,255,.10),
      inset 0 1px 0 rgba(255,255,255,.18),
      inset 0 -1px 0 rgba(0,0,0,.4);
  }
  .key.hi::before { opacity: var(--key-opacity-hi, 1); }

  /* Press flash configurable por accentColor — oculta la imagen */
  .key.active {
    opacity: 1;
    transform: translateY(1px) scale(1.06);
    color: var(--press-fg, #000000) !important;
    background-color: var(--press-bg, #ffffff) !important;
    border-color: var(--press-bg, #ffffff) !important;
    box-shadow:
      0 1px 3px rgba(0,0,0,.5),
      0 0 18px var(--press-glow-strong, rgba(255,255,255,.7)),
      0 0 38px var(--press-glow-mid, rgba(255,255,255,.32)),
      0 0 70px var(--press-glow-soft, rgba(255,255,255,.12)),
      inset 0 1px 0 var(--press-glow-inset, rgba(255,255,255,.85)),
      inset 0 -2px 4px rgba(0,0,0,.12);
    text-shadow: none;
  }
  .key.active::before { opacity: 0; }
  .key.active::after  { opacity: 0; }
  .key.hi.active {
    transform: scale(1.14);
    box-shadow:
      0 4px 22px rgba(0,0,0,.7),
      0 0 22px var(--press-glow-strong, rgba(255,255,255,.85)),
      0 0 50px var(--press-glow-mid, rgba(255,255,255,.4)),
      0 0 90px var(--press-glow-soft, rgba(255,255,255,.15)),
      inset 0 1px 0 var(--press-glow-inset, rgba(255,255,255,.9));
  }

  /* ── Mouse (perfil G PRO X SUPERLIGHT, vista superior) ─── */
  /* Silueta como polygon en %: escala automaticamente para sm/md/lg/xl */
  :root {
    /* Silueta tipo G PRO X SUPERLIGHT (vista superior, alargada) */
    /* Frente plano + hombros + lado casi recto + quiebre rapido al culatin */
    --mouse-poly: polygon(
      42% 0.4%, 58% 0.4%, 67% 1.6%, 76% 3.5%,
      83% 6.5%, 89% 11%, 93% 17%, 96.5% 24%,
      98.5% 33%, 99.7% 43%, 100% 53%, 99.8% 62%,
      99% 71%, 97.5% 79%,
      94% 84%, 88% 89%, 80% 93%, 70% 96.5%,
      58% 99%, 50% 100%, 42% 99%, 30% 96.5%,
      20% 93%, 12% 89%, 6% 84%,
      2.5% 79%, 1% 71%, 0.2% 62%, 0% 53%,
      0.3% 43%, 1.5% 33%, 3.5% 24%, 7% 17%,
      11% 11%, 17% 6.5%, 24% 3.5%, 33% 1.6%
    );
    --mouse-lmb-poly: polygon(
      49.2% 0.4%, 49.2% 46%, 0% 46%,
      0.3% 43%, 1.5% 33%, 3.5% 24%, 7% 17%,
      11% 11%, 17% 6.5%, 24% 3.5%, 33% 1.6%,
      42% 0.4%
    );
    --mouse-rmb-poly: polygon(
      50.8% 0.4%, 58% 0.4%, 67% 1.6%, 76% 3.5%,
      83% 6.5%, 89% 11%, 93% 17%, 96.5% 24%,
      98.5% 33%, 99.7% 43%, 100% 46%, 50.8% 46%
    );
  }

  #mouse {
    position: relative;
    width: 72px;
    height: 132px;
    flex-shrink: 0;
    isolation: isolate;
    transition: filter .15s ease;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.55));
  }
  #mouse:not(.has-buttons) { display: none; }

  /* Cuerpo: silueta + fragmento de imagen continua */
  #mouse .m-body {
    position: absolute; inset: 0;
    clip-path: var(--mouse-poly);
    background-color: transparent;
    overflow: hidden;
  }
  #mouse .m-body::before {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--bg-img);
    background-size: var(--cw, 360px) var(--ch, 200px);
    background-position: var(--bg-x, 0px) var(--bg-y, 0px);
    background-repeat: no-repeat;
    opacity: var(--key-opacity, 1);
    z-index: 0;
    pointer-events: none;
    transition: opacity .12s ease;
  }
  /* Gloss: brillo arriba (frente) + sombra suave abajo (joroba) */
  #mouse .m-body::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 75% 38% at 50% 6%, rgba(255,255,255,.18), transparent 70%),
      radial-gradient(ellipse 65% 50% at 50% 72%, rgba(255,255,255,.04), transparent 75%),
      linear-gradient(180deg, rgba(255,255,255,.1) 0%, rgba(255,255,255,0) 28%, rgba(0,0,0,0) 70%, rgba(0,0,0,.22) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* Outline + costura entre botones (SVG) */
  #mouse .m-outline {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 6;
    pointer-events: none;
    overflow: visible;
  }
  #mouse .m-outline path {
    fill: none;
    stroke: rgba(255,255,255,.32);
    stroke-width: 1.2;
    transition: stroke .15s ease, stroke-width .15s ease;
  }
  #mouse .m-outline path.seam {
    stroke: rgba(255,255,255,.18);
    stroke-width: .9;
  }

  /* Rueda */
  #mouse .m-wheel {
    position: absolute;
    left: 50%; top: 13%;
    width: 7px; height: 20px;
    margin-left: -3.5px;
    border-radius: 3.5px;
    background: linear-gradient(180deg, rgba(0,0,0,.85) 0%, rgba(0,0,0,.5) 50%, rgba(0,0,0,.85) 100%);
    border: 1px solid rgba(255,255,255,0.5);
    z-index: 8;
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,.2),
      inset 0 -1px 1px rgba(0,0,0,.6),
      0 1px 2px rgba(0,0,0,.5);
    overflow: hidden;
    transition: background .08s ease, border-color .08s ease, box-shadow .08s ease;
  }
  #mouse .m-wheel::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.14) 0 1px, transparent 1px 3px);
    pointer-events: none;
    transition: opacity .12s ease;
  }

  /* LED indicador (color de acento) */
  #mouse .m-led {
    position: absolute;
    left: 50%; top: 60%;
    width: 3px; height: 3px;
    margin-left: -1.5px;
    border-radius: 50%;
    background: var(--press-bg, #ffffff);
    box-shadow:
      0 0 4px var(--press-glow-strong, rgba(255,255,255,.85)),
      0 0 10px var(--press-glow-mid, rgba(255,255,255,.4));
    opacity: .55;
    z-index: 7;
    transition: opacity .15s ease, box-shadow .15s ease;
  }

  /* Botones laterales decorativos (M4/M5) */
  #mouse .m-side {
    position: absolute;
    left: 1.5%;
    width: 8.5%;
    height: 5%;
    border-radius: 2.5px;
    background: linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.32));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      inset 0 -1px 0 rgba(0,0,0,.45);
    z-index: 8;
    pointer-events: none;
  }
  #mouse .m-side.m-side-1 { top: 28%; }
  #mouse .m-side.m-side-2 { top: 35%; }

  /* Logo "G" sutil */
  #mouse .m-logo {
    position: absolute;
    left: 0; right: 0;
    bottom: 12%;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .5px;
    color: rgba(255,255,255,.16);
    text-shadow: 0 1px 1px rgba(0,0,0,.6);
    z-index: 7;
    pointer-events: none;
    user-select: none;
  }

  /* Press flashes recortados con la silueta de cada boton */
  #mouse .m-lmb-flash,
  #mouse .m-rmb-flash {
    position: absolute;
    inset: 0;
    background: var(--press-bg, #ffffff);
    opacity: 0;
    z-index: 5;
    pointer-events: none;
    transition: opacity .08s ease, box-shadow .08s ease;
  }
  #mouse .m-lmb-flash { clip-path: var(--mouse-lmb-poly); }
  #mouse .m-rmb-flash { clip-path: var(--mouse-rmb-poly); }

  #mouse.lmb-on .m-lmb-flash {
    opacity: 1;
    box-shadow:
      inset 0 0 26px var(--press-glow-mid, rgba(255,255,255,.5)),
      0 0 22px var(--press-glow-mid, rgba(255,255,255,.4));
  }
  #mouse.rmb-on .m-rmb-flash {
    opacity: 1;
    box-shadow:
      inset 0 0 26px var(--press-glow-mid, rgba(255,255,255,.5)),
      0 0 22px var(--press-glow-mid, rgba(255,255,255,.4));
  }
  #mouse.mmb-on .m-wheel {
    background: var(--press-bg, #ffffff);
    border-color: var(--press-bg, #ffffff);
    box-shadow:
      0 0 10px var(--press-glow-strong, rgba(255,255,255,.85)),
      0 0 22px var(--press-glow-mid, rgba(255,255,255,.4));
  }
  #mouse.mmb-on .m-wheel::before { opacity: 0; }
  #mouse.any-on .m-outline path { stroke: rgba(255,255,255,.7); stroke-width: 1.4; }
  #mouse.any-on .m-led { opacity: 1; }

  /* ── Sizes ───────────────────────────────────────────── */
  #container.sz-sm .key { min-width: 30px; height: 30px; font-size: 9px;  padding: 2px 6px;  border-radius: 7px; }
  #container.sz-sm .key.key-mod { min-width: 52px; padding: 2px 7px; font-size: 9px; }
  #container.sz-sm .key.has-sub { padding-bottom: 8px; }
  #container.sz-sm .key-row, #container.sz-sm #keyboard, #container.sz-sm #modifiers { gap: 4px; }
  #container.sz-sm #mouse { width: 56px; height: 102px; }
  #container.sz-sm #mouse .m-wheel { width: 6px; height: 14px; margin-left: -3px; border-radius: 3px; }

  #container.sz-md .key { min-width: 38px; height: 38px; font-size: 12px; padding: 3px 9px; }
  #container.sz-md .key.key-mod { min-width: 64px; padding: 3px 10px; font-size: 10px; }
  #container.sz-md #mouse { width: 72px; height: 132px; }

  #container.sz-lg .key { min-width: 50px; height: 50px; font-size: 16px; padding: 4px 12px; border-radius: 11px; }
  #container.sz-lg .key.key-mod { min-width: 84px; padding: 4px 14px; font-size: 13px; }
  #container.sz-lg .key-row, #container.sz-lg #keyboard, #container.sz-lg #modifiers { gap: 6px; }
  #container.sz-lg #mouse { width: 96px; height: 176px; }
  #container.sz-lg #mouse .m-wheel { width: 9px; height: 24px; margin-left: -4.5px; border-radius: 4.5px; }
  #container.sz-lg #mouse .m-led { width: 4px; height: 4px; margin-left: -2px; }

  #container.sz-xl .key { min-width: 64px; height: 64px; font-size: 22px; padding: 5px 16px; border-radius: 14px; }
  #container.sz-xl .key.key-mod { min-width: 110px; padding: 5px 18px; font-size: 17px; }
  #container.sz-xl .key-row, #container.sz-xl #keyboard, #container.sz-xl #modifiers { gap: 7px; }
  #container.sz-xl #mouse { width: 122px; height: 224px; }
  #container.sz-xl #mouse .m-wheel { width: 12px; height: 32px; margin-left: -6px; border-radius: 6px; }
  #container.sz-xl #mouse .m-led { width: 5px; height: 5px; margin-left: -2.5px; }
</style>
</head>
<body>
<div id="container" class="sz-md"><div id="modifiers"></div><div id="keyboard"><div id="kb-brand"><span class="kb-brand-mark"></span><span class="kb-brand-name">WOOTING</span><span class="kb-brand-sep"></span><span class="kb-brand-model">80HE</span><span class="kb-brand-sep"></span><span class="kb-brand-led" title="analog"></span></div></div><div id="mouse" aria-hidden="true"><div class="m-body"></div><div class="m-lmb-flash"></div><div class="m-rmb-flash"></div><div class="m-wheel"></div><div class="m-led"></div><svg class="m-outline" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M 42 0.4 L 58 0.4 L 67 1.6 L 76 3.5 L 83 6.5 L 89 11 L 93 17 L 96.5 24 L 98.5 33 L 99.7 43 L 100 53 L 99.8 62 L 99 71 L 97.5 79 L 94 84 L 88 89 L 80 93 L 70 96.5 L 58 99 L 50 100 L 42 99 L 30 96.5 L 20 93 L 12 89 L 6 84 L 2.5 79 L 1 71 L 0.2 62 L 0 53 L 0.3 43 L 1.5 33 L 3.5 24 L 7 17 L 11 11 L 17 6.5 L 24 3.5 L 33 1.6 Z"/><path class="seam" d="M 0.3 43 Q 50 51 99.7 43"/></svg></div></div>
<script>
  const container = document.getElementById('container');
  const keyboardZone = document.getElementById('keyboard');
  const modifiersZone = document.getElementById('modifiers');
  const mouseEl = document.getElementById('mouse');
  const keyEls = new Map();
  const mouseButtons = new Set();

  let cfg = {
    keys: [],
    style: {
      fontSize: 'md',
      keyColor: '#ffffff',
      bgColor: 'rgba(10,10,12,0.4)',
      accentColor: '#ffffff',
      inactiveOpacity: 0.85
    },
    background: { type: 'default', value: '' }
  };

  function isMouseKc(kc) { return kc === 'm1' || kc === 'm2' || kc === 'm3'; }

  function parseColorToRgb(input) {
    if (typeof input !== 'string') return null;
    const c = input.trim();
    if (!c) return null;
    if (c.startsWith('#')) {
      const hex = c.slice(1);
      if (hex.length === 3) {
        const r = parseInt(hex[0] + hex[0], 16);
        const g = parseInt(hex[1] + hex[1], 16);
        const b = parseInt(hex[2] + hex[2], 16);
        return Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b) ? null : { r, g, b };
      }
      if (hex.length === 6) {
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        return Number.isNaN(r) || Number.isNaN(g) || Number.isNaN(b) ? null : { r, g, b };
      }
      return null;
    }
    const m = c.match(/^rgba?\(\s*([0-9]{1,3})\s*,\s*([0-9]{1,3})\s*,\s*([0-9]{1,3})(?:\s*,\s*([01](?:\.\d+)?))?\s*\)$/i);
    if (!m) return null;
    const r = Math.max(0, Math.min(255, Number(m[1])));
    const g = Math.max(0, Math.min(255, Number(m[2])));
    const b = Math.max(0, Math.min(255, Number(m[3])));
    return { r, g, b };
  }

  function rgbaWithAlpha(rgb, alpha) {
    return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`;
  }

  function isLightColor(rgb) {
    const luminance = (0.299 * rgb.r) + (0.587 * rgb.g) + (0.114 * rgb.b);
    return luminance >= 170;
  }

  function clampNum(value, min, max, fallback) {
    const n = Number(value);
    if (!Number.isFinite(n)) return fallback;
    return Math.max(min, Math.min(max, n));
  }

  function normalizeBackground(raw) {
    const bg = raw && typeof raw === 'object' ? raw : {};
    const type = String(bg.type || '').toLowerCase();
    const value = String(bg.value || '').trim();
    if (!value || type === 'default') return { type: 'default', value: '', scale: 1, offsetX: 0, offsetY: 0 };
    if (type !== 'url' && type !== 'upload') return { type: 'default', value: '', scale: 1, offsetX: 0, offsetY: 0 };
    return {
      type,
      value,
      scale: clampNum(bg.scale, 0.1, 5, 1),
      offsetX: clampNum(bg.offsetX, -3, 3, 0),
      offsetY: clampNum(bg.offsetY, -3, 3, 0),
    };
  }

  function applyBackgroundImage() {
    const bg = normalizeBackground(cfg.background);
    if (!bg.value) {
      document.documentElement.style.removeProperty('--bg-img');
      return;
    }
    document.documentElement.style.setProperty('--bg-img', `url(${JSON.stringify(bg.value)})`);
  }

  function buildLayout(newCfg) {
    cfg = newCfg || cfg;
    const s = cfg.style || {};
    applyBackgroundImage();
    container.className = 'sz-' + (s.fontSize || 'md');
    const brandEl = document.getElementById('kb-brand');
    keyboardZone.innerHTML = '';
    if (brandEl) keyboardZone.appendChild(brandEl);
    modifiersZone.innerHTML = '';
    keyEls.clear();
    mouseButtons.clear();
    mouseEl.classList.remove('has-buttons', 'lmb-on', 'rmb-on', 'mmb-on', 'any-on');

    const opacity = s.inactiveOpacity ?? 0.85;
    document.documentElement.style.setProperty('--key-opacity', opacity);
    document.documentElement.style.setProperty('--key-opacity-hi', Math.min(1, opacity * 1.15));

    const accentColor = s.accentColor || '#ffffff';
    const accentRgb = parseColorToRgb(accentColor) || { r: 255, g: 255, b: 255 };
    const pressText = isLightColor(accentRgb) ? '#000000' : '#ffffff';
    document.documentElement.style.setProperty('--press-bg', accentColor);
    document.documentElement.style.setProperty('--press-fg', pressText);
    document.documentElement.style.setProperty('--press-glow-strong', rgbaWithAlpha(accentRgb, 0.85));
    document.documentElement.style.setProperty('--press-glow-mid', rgbaWithAlpha(accentRgb, 0.4));
    document.documentElement.style.setProperty('--press-glow-soft', rgbaWithAlpha(accentRgb, 0.15));
    document.documentElement.style.setProperty('--press-glow-inset', rgbaWithAlpha(accentRgb, 0.9));

    const main = [];
    (cfg.keys || []).forEach((k) => {
      if (isMouseKc(k.keycode)) {
        mouseButtons.add(k.keycode);
        (k.aliases || []).forEach((a) => mouseButtons.add(a));
        return;
      }
      main.push(k);
    });

    const rowMap = new Map();
    main.forEach((k) => {
      if (!rowMap.has(k.row)) rowMap.set(k.row, []);
      rowMap.get(k.row).push(k);
    });
    [...rowMap.keys()].sort((a, b) => a - b).forEach((rowNum) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'key-row';
      rowMap.get(rowNum).forEach((k) => rowEl.appendChild(buildKeyEl(k)));
      keyboardZone.appendChild(rowEl);
    });

    if (mouseButtons.size > 0) mouseEl.classList.add('has-buttons');
    if (cfg.gamepadEnabled) startGamepad(); else stopGamepad();

    // Calcula posicion del fragmento por tecla / mouse
    requestAnimationFrame(positionBackgrounds);
  }

  function positionBackgrounds() {
    const cRect = container.getBoundingClientRect();
    const cw = Math.max(1, Math.round(cRect.width));
    const ch = Math.max(1, Math.round(cRect.height));

    // Escala + desplazamiento del fondo (configurable desde el panel).
    // La imagen base cubre el cluster (cw x ch); al escalar centramos el zoom
    // y aplicamos el pan como fracción del ancho/alto base.
    const bg = normalizeBackground(cfg.background);
    const scale = bg.scale || 1;
    const offX = bg.offsetX || 0;
    const offY = bg.offsetY || 0;
    const bgW = Math.max(1, Math.round(cw * scale));
    const bgH = Math.max(1, Math.round(ch * scale));
    const anchorX = ((cw - bgW) / 2) + (offX * cw);
    const anchorY = ((ch - bgH) / 2) + (offY * ch);

    document.documentElement.style.setProperty('--cw', bgW + 'px');
    document.documentElement.style.setProperty('--ch', bgH + 'px');

    const targets = container.querySelectorAll('.key, #mouse, #kb-brand');
    targets.forEach((el) => {
      const r = el.getBoundingClientRect();
      el.style.setProperty('--bg-x', (anchorX - (r.left - cRect.left)) + 'px');
      el.style.setProperty('--bg-y', (anchorY - (r.top  - cRect.top))  + 'px');
    });

    // Informa al panel de configuración (si estamos embebidos en un iframe)
    // la posición y tamaño en pantalla del cluster, para mapear el arrastre 1:1.
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          source: 'ko-overlay',
          type: 'layout',
          rect: { x: cRect.left, y: cRect.top, w: cRect.width, h: cRect.height },
        }, '*');
      }
    } catch {}
  }

  window.addEventListener('resize', () => requestAnimationFrame(positionBackgrounds));

  function isSpaceKc(kc) { return kc === 57 || kc === '57' || kc === 'space'; }

  function buildKeyEl(k) {
    const s = cfg.style || {};
    const isSpace = isSpaceKc(k.keycode);
    const el = document.createElement('div');
    el.className = 'key' + (k.hi ? ' hi' : '') + (k.flex ? ' key-flex' : '') + (k.sub ? ' has-sub' : '') + (isSpace ? ' has-bar' : '');
    el.style.backgroundColor = s.bgColor || 'rgba(10,10,12,0.4)';
    el.style.color = s.keyColor || '#ffffff';

    const main = document.createElement('span');
    main.className = 'key-main';
    if (isSpace) {
      const bar = document.createElement('span');
      bar.className = 'key-bar';
      bar.setAttribute('aria-hidden', 'true');
      main.appendChild(bar);
    } else {
      main.textContent = k.label;
    }
    el.appendChild(main);
    if (k.sub) {
      const subEl = document.createElement('span');
      subEl.className = 'key-sub';
      subEl.textContent = k.sub;
      el.appendChild(subEl);
    }
    keyEls.set(k.keycode, el);
    (k.aliases || []).forEach((a) => keyEls.set(a, el));
    return el;
  }

  function keydown(keycode) {
    if (isMouseKc(keycode) && mouseButtons.has(keycode)) {
      if (keycode === 'm1') mouseEl.classList.add('lmb-on');
      if (keycode === 'm2') mouseEl.classList.add('rmb-on');
      if (keycode === 'm3') mouseEl.classList.add('mmb-on');
      mouseEl.classList.add('any-on');
      return;
    }
    const el = keyEls.get(keycode);
    if (el) el.classList.add('active');
  }

  function keyup(keycode) {
    if (isMouseKc(keycode) && mouseButtons.has(keycode)) {
      if (keycode === 'm1') mouseEl.classList.remove('lmb-on');
      if (keycode === 'm2') mouseEl.classList.remove('rmb-on');
      if (keycode === 'm3') mouseEl.classList.remove('mmb-on');
      if (!mouseEl.classList.contains('lmb-on') &&
          !mouseEl.classList.contains('rmb-on') &&
          !mouseEl.classList.contains('mmb-on')) {
        mouseEl.classList.remove('any-on');
      }
      return;
    }
    const el = keyEls.get(keycode);
    if (el) el.classList.remove('active');
  }

  function getWsCandidates() {
    const params = new URLSearchParams(window.location.search || '');
    const custom = params.get('ws');
    const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const sameHost = window.location.host ? `${proto}//${window.location.host}` : '';
    return [...new Set([custom, sameHost, 'ws://localhost:9001', 'ws://127.0.0.1:9001'].filter(Boolean))];
  }

  let retryDelay = 500;
  let wsCandidates = getWsCandidates();
  let wsIndex = 0;

  async function fetchConfigSnapshot() {
    try {
      const r = await fetch('/key-overlay-config', { cache: 'no-store' });
      if (!r.ok) return;
      const data = await r.json();
      if (data && typeof data === 'object') buildLayout(data);
    } catch {}
  }

  function scheduleReconnect() {
    wsIndex = (wsIndex + 1) % wsCandidates.length;
    const delay = retryDelay;
    retryDelay = Math.min(retryDelay * 2, 10000);
    setTimeout(connect, delay);
  }

  function connect() {
    const wsUrl = wsCandidates[wsIndex] || 'ws://localhost:9001';
    let ws = null;
    try { ws = new WebSocket(wsUrl); } catch { scheduleReconnect(); return; }
    ws.onopen = () => {
      retryDelay = 500;
      wsIndex = 0;
      fetchConfigSnapshot();
    };
    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'config') buildLayout(msg.data);
        if (msg.type === 'config-refresh') fetchConfigSnapshot();
        if (msg.type === 'keydown') keydown(msg.keycode);
        if (msg.type === 'keyup') keyup(msg.keycode);
      } catch {}
    };
    ws.onclose = scheduleReconnect;
    ws.onerror = () => ws.close();
  }
  connect();

  // ── Gamepad / Wooting analog ────────────────────────────────
  // Maps left-stick axes to WASD keycodes (uiohook-napi values)
  const GP_AXIS = [
    { axis: 0, neg: 30, pos: 32 }, // X: left=A, right=D
    { axis: 1, neg: 17, pos: 31 }, // Y: up=W, down=S
  ];
  const GP_THRESH = 0.3;
  let gpState = {}, gpRaf = null;

  function gpPoll() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    const gp = Array.from(gamepads).find(g => g && g.connected);
    if (gp) {
      GP_AXIS.forEach(({ axis, neg, pos }) => {
        if (axis >= gp.axes.length) return;
        const v = gp.axes[axis];
        const kn = 'a' + axis + 'n', kp = 'a' + axis + 'p';
        if (v < -GP_THRESH) { if (!gpState[kn]) { keydown(neg); gpState[kn] = true; } }
        else { if (gpState[kn]) { keyup(neg); gpState[kn] = false; } }
        if (v > GP_THRESH)  { if (!gpState[kp]) { keydown(pos); gpState[kp] = true; } }
        else { if (gpState[kp]) { keyup(pos); gpState[kp] = false; } }
      });
      const btnMap = cfg.gamepadButtons || {};
      gp.buttons.forEach((btn, i) => {
        const kc = btnMap[String(i)];
        if (kc === undefined) return;
        const pressed = btn.pressed || btn.value > 0.5;
        const k = 'b' + i;
        if (pressed && !gpState[k]) { keydown(kc); gpState[k] = true; }
        else if (!pressed && gpState[k]) { keyup(kc); gpState[k] = false; }
      });
    }
    gpRaf = requestAnimationFrame(gpPoll);
  }

  function startGamepad() {
    if (gpRaf) return;
    gpState = {};
    gpRaf = requestAnimationFrame(gpPoll);
  }

  function stopGamepad() {
    if (!gpRaf) return;
    cancelAnimationFrame(gpRaf); gpRaf = null;
    // Release any held keys
    GP_AXIS.forEach(({ axis, neg, pos }) => {
      if (gpState['a' + axis + 'n']) keyup(neg);
      if (gpState['a' + axis + 'p']) keyup(pos);
    });
    const btnMap = cfg.gamepadButtons || {};
    Object.keys(gpState).forEach(k => {
      const m = k.match(/^b(\d+)$/);
      if (m && gpState[k]) { const kc = btnMap[m[1]]; if (kc !== undefined) keyup(kc); }
    });
    gpState = {};
  }

</script>
</body>
