<div id="tb">
  <span class="tb-sub">Panel de control</span>
  <span id="appVersion" style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-left:4px"></span>
  <div class="tb-spacer"></div>
  <div class="tb-conn" id="connPill"><div class="cdot" id="connDot"></div><span id="connTxt">Desconectado</span></div>
  <span id="connChan" class="tb-chan hidden"></span>
  <button id="tbLogToggleBtn" class="tb-pill-btn tb-log-btn" onclick="toggleLogSidebar()" title="Mostrar log" aria-pressed="false">
    <span class="tb-log-ico tb-log-ico-show" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </span>
    <span class="tb-log-ico tb-log-ico-hide" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </span>
    <span id="tbLogToggleTxt">Mostrar log</span>
  </button>
  <div class="tb-btns">
    <button class="tb-btn" onclick="api.minimize()">─</button>
    <button class="tb-btn" onclick="api.maximize()">□</button>
    <button class="tb-btn x" onclick="api.close()">✕</button>
  </div>
</div>
