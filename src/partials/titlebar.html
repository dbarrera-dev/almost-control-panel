<div id="tb">
  <div class="tb-brand">
    <img id="brandLogo" class="hidden" style="width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0" alt="logo" />
    <div class="tb-brand-dot" id="brandDot"></div>
    ALMOST
  </div>
  <div class="tb-divider"></div>
  <span class="tb-sub">PANEL DE CONTROL</span>
  <span id="appVersion" style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-left:4px"></span>
  <div class="tb-spacer"></div>
  <div class="tb-conn" id="connPill"><div class="cdot" id="connDot"></div><span id="connTxt">Desconectado</span></div>
  <span id="connChan" class="tb-chan hidden"></span>
  <div class="tb-btns">
    <button class="tb-btn" onclick="api.minimize()">─</button>
    <button class="tb-btn" onclick="api.maximize()">□</button>
    <button class="tb-btn x" onclick="api.close()">✕</button>
  </div>
</div>
