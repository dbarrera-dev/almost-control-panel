<div class="view" id="view-anuncios">
  <header class="page-head">
    <div class="page-head-main">
      <div class="page-eyebrow">// Módulo 06</div>
      <h1 class="page-title">Anuncios</h1>
      <p class="page-sub">Redactá embeds, envialos o programalos a Discord con webhooks configurables.</p>
    </div>
    <div class="page-actions">
      <button class="btn btn-ghost btn-ico" onclick="annOpenBotModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="10" x="3" y="8" rx="2"/><path d="M12 8V5"/><path d="M8 12h.01"/><path d="M16 12h.01"/><path d="M8 18v2"/><path d="M16 18v2"/></svg>
        Perfil bot
      </button>
      <button class="btn btn-ghost btn-ico" onclick="annOpenWebhookModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg>
        Webhooks
      </button>
      <button class="btn btn-orange btn-ico" onclick="annOpenComposeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo anuncio
      </button>
    </div>
  </header>

  <div class="ops-stats content-stats">
    <div class="ops-stat">
      <div class="ops-stat-l">Anuncios</div>
      <div class="ops-stat-n" id="annStatTotal">0</div>
    </div>
    <div class="ops-stat">
      <div class="ops-stat-l">Enviados</div>
      <div class="ops-stat-n" id="annStatSent">0</div>
    </div>
    <div class="ops-stat">
      <div class="ops-stat-l">Programados</div>
      <div class="ops-stat-n accent" id="annStatScheduled">0</div>
    </div>
  </div>

  <section class="ops-panel content-list-card">
    <div class="ops-panel-head">
      <span class="ops-panel-title"><span class="tick"></span>Anuncios</span>
      <span class="ops-panel-meta">
        <input id="annSearchInput" class="content-head-search" type="text" placeholder="Buscar..." oninput="annRenderHistory()" />
        <button class="btn btn-ghost todo-mini-btn" onclick="loadAnuncios()" title="Recargar">↻</button>
      </span>
    </div>
    <div class="ops-panel-body">
      <div class="content-tabs">
        <button class="content-tab on" id="annFilterAll" onclick="annSetFilter('all')">Todos</button>
        <button class="content-tab" id="annFilterScheduled" onclick="annSetFilter('scheduled')">Programados <span id="annFilterSchedCount">0</span></button>
        <button class="content-tab" id="annFilterSent" onclick="annSetFilter('sent')">Enviados</button>
        <button class="content-tab" id="annFilterFailed" onclick="annSetFilter('failed')">Fallidos</button>
      </div>
      <div id="annHistoryList" class="content-list-body">
        <div class="empty content-empty">
          <div class="empty-ico">!</div>
          <p>Todavía no hay anuncios.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ─── Modal: Constructor de anuncio ───────────────────────────── -->
  <div class="s-modal hidden" id="annComposeModal" onclick="if(event.target===this)annCloseComposeModal()">
    <div class="s-modal-card s-modal-card-xwide">
      <header class="s-modal-head">
        <div class="s-modal-title" id="annComposeTitle">Nuevo anuncio</div>
        <button class="s-modal-close" onclick="annCloseComposeModal()" aria-label="Cerrar">✕</button>
      </header>
      <div class="s-modal-body">
        <div class="content-ann-grid">
          <div class="ann-compose-form">
            <div class="ig">
              <label>Canal / Webhook <span class="ann-field-meta" id="annWebhookMeta">Sin webhooks</span></label>
              <select id="annWebhookSelect" data-uisel></select>
            </div>
            <div class="ig">
              <label>Título</label>
              <input id="annTitle" type="text" placeholder="Ej: Nuevo video disponible" oninput="annPreview()" />
            </div>
            <div class="ig">
              <label>Mensaje</label>
              <textarea id="annBody" class="content-textarea" rows="6" placeholder="Texto del anuncio..." oninput="annPreview()"></textarea>
            </div>
            <div class="content-form-grid">
              <div class="ig">
                <label>Imagen</label>
                <div class="content-add-row">
                  <input id="annImageUrl" type="text" placeholder="Pegar URL de imagen..." oninput="annPreview()" />
                  <button type="button" class="content-icon-btn" onclick="document.getElementById('annImageFile').click()" title="Subir imagen" aria-label="Subir imagen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  </button>
                  <input id="annImageFile" type="file" accept="image/*" class="content-file-hidden" onchange="annUploadImage(this)" />
                </div>
              </div>
              <div class="ig">
                <label>Footer</label>
                <input id="annFooter" type="text" placeholder="Almost Control" oninput="annPreview()" />
              </div>
            </div>
            <div class="ig">
              <label>Color del embed</label>
              <div class="color-row">
                <button class="color-swatch on" data-color="#e07000" style="background:#e07000" onclick="annPickColor(this)" title="Naranja"></button>
                <button class="color-swatch" data-color="#5865F2" style="background:#5865F2" onclick="annPickColor(this)" title="Discord"></button>
                <button class="color-swatch" data-color="#22c55e" style="background:#22c55e" onclick="annPickColor(this)" title="Verde"></button>
                <button class="color-swatch" data-color="#a855f7" style="background:#a855f7" onclick="annPickColor(this)" title="Violeta"></button>
                <button class="color-swatch" data-color="#ef4444" style="background:#ef4444" onclick="annPickColor(this)" title="Rojo"></button>
                <input id="annColor" type="text" value="#e07000" oninput="annPreview()" />
              </div>
            </div>

            <div class="ann-schedule">
              <label class="s-check-block ann-schedule-toggle">
                <input type="checkbox" id="annScheduleToggle" onchange="annToggleSchedule()" />
                <span>Programar envío</span>
              </label>
              <div class="ig hidden" id="annScheduleRow">
                <label>Fecha y hora de envío</label>
                <input id="annScheduleAt" type="datetime-local" style="color-scheme:dark" onchange="annPreview()" />
              </div>
            </div>
          </div>

          <div class="ann-compose-preview">
            <div class="ann-preview-label"><span class="tick"></span>Preview · <span id="annPreviewChannel"># canal</span></div>
            <div id="annDiscordPreview" class="discord-preview"></div>
          </div>
        </div>

        <div id="annMsg" class="content-msg"></div>
        <div class="s-modal-actions s-modal-actions-end">
          <button class="btn btn-ghost" onclick="annCloseComposeModal()">Cancelar</button>
          <button class="btn btn-orange btn-ico" id="annSendBtn" onclick="annSubmit()">
            <svg id="annSendBtnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            <span id="annSendBtnLabel">Enviar a Discord</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Modal: Webhooks ─────────────────────────────────────────── -->
  <div class="s-modal hidden" id="annWebhookModal" onclick="if(event.target===this)annCloseWebhookModal()">
    <div class="s-modal-card s-modal-card-wide">
      <header class="s-modal-head">
        <div class="s-modal-title">Webhooks de Discord</div>
        <button class="s-modal-close" onclick="annCloseWebhookModal()" aria-label="Cerrar">✕</button>
      </header>
      <div class="s-modal-body">
        <div class="s-form-grid">
          <div class="ig">
            <label>Nombre del canal</label>
            <input id="annWebhookName" type="text" placeholder="general" />
          </div>
          <div class="ig">
            <label>URL del webhook</label>
            <input id="annWebhookUrl" type="text" placeholder="https://discord.com/api/webhooks/..." />
          </div>
        </div>
        <div class="s-modal-actions">
          <button class="btn btn-orange btn-ico" onclick="annAddWebhook()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Agregar webhook
          </button>
        </div>
        <div id="annWebhookMsg" class="content-msg"></div>
        <div id="annWebhookList" class="webhook-list"></div>
      </div>
    </div>
  </div>

  <!-- ─── Modal: Perfil del bot ───────────────────────────────────── -->
  <div class="s-modal hidden" id="annBotModal" onclick="if(event.target===this)annCloseBotModal()">
    <div class="s-modal-card">
      <header class="s-modal-head">
        <div class="s-modal-title">Perfil del bot</div>
        <button class="s-modal-close" onclick="annCloseBotModal()" aria-label="Cerrar">✕</button>
      </header>
      <div class="s-modal-body">
        <div class="ig">
          <label>Nombre</label>
          <input id="annBotName" type="text" placeholder="Almost Bot" />
        </div>
        <div class="ig">
          <label>Avatar URL</label>
          <input id="annBotAvatar" type="text" placeholder="https://..." />
        </div>
        <div class="ig">
          <label>Bucket de imágenes</label>
          <input id="annBucketName" type="text" placeholder="almost-content" />
        </div>
        <div class="s-modal-actions s-modal-actions-end">
          <button class="btn btn-ghost" onclick="annCloseBotModal()">Cancelar</button>
          <button class="btn btn-orange" onclick="annSaveBotSettings()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
